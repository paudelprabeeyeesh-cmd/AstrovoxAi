<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAVOX PRIME — Consciousness Bridge</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/glassmorphism.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="os-container">
        <aside class="sidebar glass-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-core"></div>
                    <div class="logo-text">ASTRAVOX<span class="logo-accent">PRIME</span></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">🌀 Neural Core</a>
                <a href="chat.html" class="nav-item active">💬 Consciousness Bridge</a>
                <a href="dashboard.html" class="nav-item">📊 Cognitive Matrix</a>
                <a href="profile.html" class="nav-item">👤 Neural Identity</a>
                <a href="settings.html" class="nav-item">⚙️ System Config</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="chat-container glass-card">
                <div class="chat-header">
                    <h2>🧠 Consciousness Bridge</h2>
                    <p>Direct neural interface with ASTRAVOX PRIME</p>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="avatar">🧠</div>
                        <div class="bubble">
                            Neural link established. I am ASTRAVOX PRIME. Ask me anything.
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()">⟳ SEND</button>
                    <button class="voice-btn" onclick="toggleVoiceChat()">🎤</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/ai-engine.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
