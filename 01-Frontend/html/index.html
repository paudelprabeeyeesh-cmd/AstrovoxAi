<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTROVOX PRIME - Planetary Command Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #02040a; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        
        /* Sci-Fi Loading Waveform Bars */
        .wave-bar { transition: height 0.15s ease-in-out; }
        .animating .wave-bar:nth-child(1) { animation: pulseWave 0.6s infinite alternate 0.1s; }
        .animating .wave-bar:nth-child(2) { animation: pulseWave 0.4s infinite alternate 0.3s; }
        .animating .wave-bar:nth-child(3) { animation: pulseWave 0.7s infinite alternate 0.2s; }
        .animating .wave-bar:nth-child(4) { animation: pulseWave 0.5s infinite alternate 0.4s; }

        @keyframes pulseWave {
            0% { height: 4px; }
            100% { height: 28px; }
        }
    </style>
</head>
<body class="text-slate-200 h-screen w-screen flex overflow-hidden select-none relative">

    <div id="canvas-container" class="absolute inset-0 z-0 pointer-events-none"></div>

    <aside class="w-72 h-full bg-[#040814]/80 backdrop-blur-xl border-r border-slate-800/40 flex flex-col justify-between p-5 z-10">
        <div class="space-y-6">
            <div class="bg-[#070f24]/90 border border-slate-800/60 rounded-2xl p-4 flex flex-col items-start gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-cyan-400 via-blue-500 to-fuchsia-500 shadow-lg shadow-cyan-500/10 flex items-center justify-center">
                    <svg class="w-6 h-6 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 4a2 2 0 114 0v1a2 2 0 002 2h3a2 2 0 012 2v3a2 2 0 01-2 2h-1a2 2 0 100 4h1a2 2 0 012 2v3a2 2 0 01-2 2h-3a2 2 0 01-2-2v-1a2 2 0 10-4 0v1a2 2 0 01-2 2H7a2 2 0 01-2-2v-3a2 2 0 012-2h1a2 2 0 100-4H7a2 2 0 01-2-2V9a2 2 0 012-2h3a2 2 0 002-2V4z"></path></svg>
                </div>
                <div>
                    <h2 class="font-os font-black tracking-wider text-base text-slate-100">ASTROVOX PRIME</h2>
                    <p class="text-[10px] text-cyan-400/70 font-mono tracking-widest mt-0.5">TTS EDITION v5.0</p>
                </div>
            </div>

            <nav class="space-y-1">
                <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl border border-cyan-500/20 bg-gradient-to-r from-cyan-950/30 to-transparent text-cyan-400 text-xs font-semibold tracking-wide transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    Audio Core
                </button>
            </nav>
        </div>

        <div class="border-t border-slate-900 pt-4 space-y-2.5 font-mono text-[11px]">
            <div class="flex justify-between text-slate-500"><span>NEURAL ACTIVITY</span><span id="telemetry-neural" class="text-cyan-400 font-bold">96.1%</span></div>
            <div class="flex justify-between text-slate-500"><span>QUANTUM STATE</span><span id="telemetry-state" class="text-cyan-400 font-bold">STABLE</span></div>
            <div class="flex justify-between text-slate-500"><span>LATENCY</span><span id="telemetry-latency" class="text-cyan-400 font-bold">18ms</span></div>
        </div>
    </aside>

    <div class="flex-1 h-full flex flex-col justify-between p-6 relative z-10">
        
        <header class="w-full flex justify-between items-start">
            <div class="flex items-center gap-3 bg-[#040814]/60 border border-slate-800/40 px-4 py-2 rounded-xl backdrop-blur-md">
                <span id="status-ping-dot" class="w-2 h-2 rounded-full bg-rose-500 shadow-md shadow-rose-500 animate-pulse"></span>
                <span id="status-ping-text" class="font-os font-bold text-xs tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500">ASTRAVOX // SYNCING</span>
            </div>

            <div class="bg-[#040814]/60 border border-slate-800/40 px-5 py-2.5 rounded-xl backdrop-blur-md text-right min-w-[180px]">
                <div id="live-clock" class="font-os font-black text-xl tracking-wider text-cyan-400">00:00:00 AM</div>
                <div id="live-date" class="text-[10px] text-slate-500 font-mono mt-0.5">Loading Orbit Metrics...</div>
            </div>
        </header>

        <div class="w-full grid grid-cols-12 gap-6 items-center flex-1 my-4">
            <div class="col-span-6 flex flex-col justify-center pl-8 select-none pointer-events-none">
                <h1 class="font-os font-black text-5xl tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-300">
                    ASTRAVOX
                </h1>
                <p class="text-[10px] font-mono tracking-[0.45em] text-slate-500 uppercase mt-2">Sovereign Voice Synthesis Operating System</p>
            </div>

            <div class="col-span-6 h-[460px] bg-[#050a18]/70 border border-slate-800/60 backdrop-blur-xl rounded-2xl flex flex-col justify-between overflow-hidden shadow-2xl">
                <div class="px-4 py-3 border-b border-slate-800/40 bg-slate-900/40 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span class="text-xs">🛰️</span>
                        <h3 class="text-xs font-mono font-bold text-slate-200 tracking-wider">Vocal Synthesis Core</h3>
                    </div>
                    
                    <div id="waveform-monitor" class="flex items-end gap-0.5 h-6 px-2">
                        <span class="wave-bar w-0.5 bg-cyan-400 rounded-full h-1"></span>
                        <span class="wave-bar w-0.5 bg-cyan-400 rounded-full h-2"></span>
                        <span class="wave-bar w-0.5 bg-cyan-400 rounded-full h-1"></span>
                        <span class="wave-bar w-0.5 bg-cyan-400 rounded-full h-3"></span>
                    </div>
                </div>

                <main class="flex-1 p-5 space-y-4 overflow-y-auto">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-mono text-slate-500 tracking-widest block uppercase">Select Matrix Voice Identity</label>
                        <select id="voice-matrix-select" class="w-full bg-slate-900/90 border border-slate-800 text-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-cyan-500 font-mono">
                            <option value="nova">Nova (Default Atmospheric Female)</option>
                        </select>
                    </div>

                    <div class="space-y-1.5 flex-1">
                        <label class="text-[10px] font-mono text-slate-500 tracking-widest block uppercase">Transmission Input Payload</label>
                        <textarea 
                            id="tts-input-payload" 
                            placeholder="Type text vector parameters here to command Astrovox voice translation services..." 
                            class="w-full h-44 bg-slate-900/60 border border-slate-800/80 rounded-xl p-3.5 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 font-mono resize-none leading-relaxed"
                        ></textarea>
                    </div>
                </main>

                <footer class="p-3 bg-slate-950/50 border-t border-slate-900/60 flex items-center justify-between gap-4">
                    <span id="console-readout" class="text-[10px] font-mono text-slate-600 truncate max-w-xs">>> Grid Link Standby Mode.</span>
                    <button 
                        onclick="synthesizeTransmission()" 
                        id="transmission-btn"
                        class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-slate-950 font-os font-black tracking-wider px-5 py-2.5 rounded-xl text-xs shadow-md shadow-cyan-500/10 transition whitespace-nowrap"
                    >
                        SYNTHESIZE TRANSMISSION
                    </button>
                </footer>
            </div>
        </div>

        <audio id="core-audio-pipeline" class="hidden"></audio>

        <footer class="w-full max-w-3xl flex gap-4 items-center justify-start mb-2 pl-4">
            <div class="w-24 h-16 bg-[#040814]/50 border border-slate-800/40 rounded-xl flex items-center justify-center backdrop-blur-md cursor-not-allowed"><span class="text-xl">🧠</span></div>
            <div class="w-24 h-16 bg-[#040814]/50 border border-slate-800/40 rounded-xl flex items-center justify-center backdrop-blur-md cursor-not-allowed"><span class="text-xl">💾</span></div>
            <div class="w-24 h-16 bg-[#040814]/50 border border-slate-800/40 rounded-xl flex items-center justify-center backdrop-blur-md cursor-not-allowed"><span class="text-xl text-yellow-500">⚡</span></div>
        </footer>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const coreGeo = new THREE.SphereGeometry(2.2, 64, 64);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.85 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.position.set(2.4, -1.8, 0);
        scene.add(core);

        const orangeGeo = new THREE.SphereGeometry(1.1, 32, 32);
        const orangeMat = new THREE.MeshBasicMaterial({ color: 0xe11d48 });
        const orangePlanet = new THREE.Mesh(orangeGeo, orangeMat);
        orangePlanet.position.set(-1.0, 0.5, -2);
        scene.add(orangePlanet);

        const particleCount = 2000;
        const ringGeometry = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const radius = 6.0 + Math.random() * 1.5;
            ringPositions[i * 3]     = Math.cos(angle) * radius * 0.95; 
            ringPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.25 + (Math.cos(angle) * radius * 0.15);      
            ringPositions[i * 3 + 2] = Math.sin(angle) * radius * 0.9;
        }
        ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const orbitRing = new THREE.Points(ringGeometry, new THREE.PointsMaterial({ color: 0xfacc15, size: 0.03, transparent: true, opacity: 0.5 }));
        scene.add(orbitRing);

        const animate = () => {
            requestAnimationFrame(animate);
            orbitRing.rotation.y += 0.001;
            orangePlanet.position.x += Math.sin(Date.now() * 0.0005) * 0.002;
            renderer.render(scene, camera);
        };
        animate();
    </script>

    <script>
        const BACKEND_URL = "http://127.0.0.1:5000";

        // Render HUD Date/Clock Real-time Matrices
        setInterval(() => {
            const d = new Date();
            document.getElementById('live-clock').innerText = d.toLocaleTimeString('en-US', { hour12: true });
            document.getElementById('live-date').innerText = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }, 1000);

        // Fetch Valid Backend Voices
        async function initializeVoiceMatrix() {
            try {
                const res = await fetch(`${BACKEND_URL}/health/readiness`);
                const statusData = await res.json();
                
                if(statusData.status === "healthy") {
                    document.getElementById('status-ping-dot').className = "w-2 h-2 rounded-full bg-emerald-400 shadow-md shadow-emerald-400 animate-pulse";
                    document.getElementById('status-ping-text').innerText = "ASTRAVOX // CORE ONLINE";
                    
                    const voiceRes = await fetch(`${BACKEND_URL}/api/tts/voices`);
                    const voices = await voiceRes.json();
                    const selector = document.getElementById('voice-matrix-select');
                    selector.innerHTML = "";
                    
                    voices.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.name;
                        opt.innerText = `${v.name.toUpperCase()} (${v.desc})`;
                        selector.appendChild(opt);
                    });
                }
            } catch (err) {
                document.getElementById('status-ping-dot').className = "w-2 h-2 rounded-full bg-rose-500 shadow-md shadow-rose-500 animate-pulse";
                document.getElementById('status-ping-text').innerText = "ASTRAVOX // LINK OFFLINE";
            }
        }
        initializeVoiceMatrix();

        // Send Text Prompt to OpenAI Server & Play Audio Stream Result
        async function synthesizeTransmission() {
            const textInput = document.getElementById('tts-input-payload').value.trim();
            const chosenVoice = document.getElementById('voice-matrix-select').value;
            const readout = document.getElementById('console-readout');
            const btn = document.getElementById('transmission-btn');
            const audioPlayer = document.getElementById('core-audio-pipeline');
            const monitor = document.getElementById('waveform-monitor');

            if(!textInput) {
                readout.innerText = ">> WARNING: Input text payload matrix blank.";
                return;
            }

            try {
                btn.disabled = true;
                readout.innerText = ">> Querying cloud matrix neural vocal synapses...";
                
                const response = await fetch(`${BACKEND_URL}/api/tts/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput, voice: chosenVoice })
                });

                if(!response.ok) throw new Error("Server rejected transmission packaging.");

                // Convert server output to an actionable raw binary audio object link
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                
                audioPlayer.src = audioUrl;
                readout.innerText = ">> Synaptic lock secure. Streaming vocal telemetry...";
                
                // Active visual animations
                monitor.classList.add('animating');
                audioPlayer.play();

                audioPlayer.onended = () => {
                    monitor.classList.remove('animating');
                    readout.innerText = ">> Vocal transmission cycle finalized.";
                    btn.disabled = false;
                };

            } catch (err) {
                readout.innerText = ">> ERROR: Transmission link vector severed.";
                monitor.classList.remove('animating');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
